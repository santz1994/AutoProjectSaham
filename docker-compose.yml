services:
  # Redis for Celery broker and caching
  redis:
    image: redis:7-alpine
    container_name: autosaham_redis
    environment:
      TZ: Asia/Jakarta
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autosaham

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: autosaham_postgres
    environment:
      POSTGRES_DB: autosaham
      POSTGRES_USER: trading
      POSTGRES_PASSWORD: ${DB_PASSWORD:-trading_secure_pwd}
      TZ: Asia/Jakarta  # Jakarta timezone
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trading"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - autosaham

  # Kong API Gateway (rate-limiting, routing, SSL termination)
  kong:
    image: kong:3.6
    container_name: autosaham_kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      TZ: Asia/Jakarta
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
    ports:
      - "80:8000"        # HTTP proxy (external)
      - "443:8443"       # HTTPS proxy (external)
      - "8002:8001"      # Admin API (dev/ops only)
    depends_on:
      - api
      - redis
    networks:
      - autosaham
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # AutoSaham API Server (internal only, behind Kong)
  api:
    build: .
    container_name: autosaham_api
    environment:
      PYTHONUNBUFFERED: 1
      PYTHONDONTWRITEBYTECODE: 1
      DATABASE_URL: "postgresql://trading:${DB_PASSWORD:-trading_secure_pwd}@postgres:5432/autosaham"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_RESULT_BACKEND: "redis://redis:6379/1"
      AUTOSAHAM_STATE_REDIS_URL: "redis://redis:6379/2"
      AUTOSAHAM_STATE_REDIS_PRIMARY_NAMESPACES: "${AUTOSAHAM_STATE_REDIS_PRIMARY_NAMESPACES:-ai_regime_state,broker_connection,user_settings}"
      AUTOSAHAM_STATE_REDIS_PRIMARY_SHADOW_SQLITE: "${AUTOSAHAM_STATE_REDIS_PRIMARY_SHADOW_SQLITE:-1}"
      AUTOSAHAM_STATE_POSTGRES_URL: "${AUTOSAHAM_STATE_POSTGRES_URL:-postgresql://trading:${DB_PASSWORD:-trading_secure_pwd}@postgres:5432/autosaham}"
      AUTOSAHAM_STATE_POSTGRES_AI_LOGS_ENABLED: "${AUTOSAHAM_STATE_POSTGRES_AI_LOGS_ENABLED:-1}"
      AUTOSAHAM_STATE_POSTGRES_AI_LOGS_SHADOW_SQLITE: "${AUTOSAHAM_STATE_POSTGRES_AI_LOGS_SHADOW_SQLITE:-1}"
      AUTH_EXPOSE_RESET_TOKEN: "${AUTH_EXPOSE_RESET_TOKEN:-0}"
      TZ: Asia/Jakarta
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      API_HOST: 0.0.0.0
      API_PORT: 8000
      # Broker credentials (override in .env)
      STOCKBIT_API_KEY: ${STOCKBIT_API_KEY}
      STOCKBIT_SECRET: ${STOCKBIT_SECRET}
      AJAIB_EMAIL: ${AJAIB_EMAIL}
      AJAIB_PASSWORD: ${AJAIB_PASSWORD}
      INDOPREMIER_USERNAME: ${INDOPREMIER_USERNAME}
      INDOPREMIER_PASSWORD: ${INDOPREMIER_PASSWORD}
    ports:
      - "8001:8000"  # Internal only; externally Kong is on 80/443
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      prometheus:
        condition: service_started
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    networks:
      - autosaham
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: autosaham_prometheus
    environment:
      TZ: Asia/Jakarta
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    networks:
      - autosaham
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:9090"]
      interval: 30s
      timeout: 10s
      retries: 3

  # AlertManager for alert routing
  alertmanager:
    image: prom/alertmanager:latest
    container_name: autosaham_alertmanager
    environment:
      TZ: Asia/Jakarta
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - autosaham

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: autosaham_grafana
    environment:
      TZ: Asia/Jakarta
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin_secure_pwd}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources:ro
    depends_on:
      - prometheus
    networks:
      - autosaham
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Node Exporter for system metrics
  node_exporter:
    image: prom/node-exporter:latest
    container_name: autosaham_node_exporter
    environment:
      TZ: Asia/Jakarta
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - autosaham

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local
  grafana_data:
    driver: local

networks:
  autosaham:
    driver: bridge
