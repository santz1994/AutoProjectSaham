# Kong declarative config for AutoSaham API Gateway
# Place at: kong/kong.yml

_format_version: "3.0"

services:
  - name: fastapi-backend
    url: http://api:8001

routes:
  - name: auth-routes
    service: fastapi-backend
    paths:
      - /auth/login
      - /auth/register
      - /auth/forgot-password
    methods:
      - POST
    strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 20
          hour: 300
          policy: local
          fault_tolerant: true

  - name: ai-inference-routes
    service: fastapi-backend
    paths:
      - /api/signals
      - /api/ai/projection
      - /api/ai/logs
    strip_path: false
    plugins:
      - name: rate-limiting
        config:
          second: 5
          minute: 120
          policy: local
          fault_tolerant: true

  - name: execution-routes
    service: fastapi-backend
    paths:
      - /api/broker/connect
      - /api/broker/disconnect
      - /api/strategies
      - /api/trades
    strip_path: false
    plugins:
      - name: rate-limiting
        config:
          second: 3
          minute: 60
          policy: local
          fault_tolerant: true

  - name: api-routes
    service: fastapi-backend
    paths:
      - /api
    strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 300
          policy: local
          fault_tolerant: true
      - name: request-transformer
        config:
          add:
            headers:
              - X-Forwarded-By: Kong

  - name: websocket-routes
    service: fastapi-backend
    paths:
      - /ws
    strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 240
          policy: local

  - name: health-check
    service: fastapi-backend
    paths:
      - /health
    strip_path: false

plugins:
  - name: cors
    config:
      origins:
        - http://localhost:3000
        - http://localhost:5173
      credentials: true
      max_age: 3600

  - name: request-id
    config:
      header_name: X-Request-ID
      generator: uuid
